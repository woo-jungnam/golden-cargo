<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi Tiết Dịch Vụ - GOLDEN CARGO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=400;500;600;700;800&display=swap');
        
        :root {
            --primary: #0a192f;
            --primary-light: #172a45;
            --accent: #ffb703;
            --text-main: #0a192f;
            --text-muted: #4a5568;
            --bg-light: #f4f7fa;
            --bg-card: rgba(255, 255, 255, 0.9);
            --transition-curve: cubic-bezier(0.25, 1, 0.5, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: var(--text-main);
            background-color: var(--bg-light);
            line-height: 1.8;
            overflow-x: hidden;
            padding-top: 85px;
        }

        body::before {
            content: ''; 
            position: absolute; 
            inset: 0;
            background-image: radial-gradient(rgba(10, 25, 47, 0.04) 1.2px, transparent 1.2px);
            background-size: 30px 30px; 
            z-index: -5; 
            pointer-events: none;
        }

        .hero-banner-section {
            position: relative;
            width: 100%;
            height: 420px;
            background-color: var(--primary);
            overflow: hidden;
            display: flex;
            align-items: center;
        }

        .hero-bg-image {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.35;
            filter: scale(1.1);
            animation: slowZoom 20s infinite alternate;
        }

        .hero-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(10, 25, 47, 0.95) 0%, rgba(23, 42, 69, 0.7) 100%);
            z-index: 1;
        }

        .hero-shape {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            overflow: hidden;
            line-height: 0;
            z-index: 2;
        }

        .hero-shape svg {
            position: relative;
            display: block;
            width: calc(130% + 1.3px);
            height: 60px;
            transform: rotateY(180deg);
        }

        .hero-shape .shape-fill {
            fill: var(--bg-light);
        }

        .hero-container {
            position: relative;
            max-width: 1100px;
            width: 100%;
            margin: 0 auto;
            padding: 0 24px;
            z-index: 3;
            margin-bottom: 40px;
        }

        .hero-breadcrumbs {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .btn-back-hero {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: color 0.3s ease;
        }

        .btn-back-hero:hover {
            color: var(--accent);
        }

        .btn-back-hero i {
            transition: transform 0.3s var(--transition-curve);
        }

        .btn-back-hero:hover i {
            transform: translateX(-4px);
        }

        .hero-meta {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 15px;
        }

        .hero-tag {
            display: inline-block;
            padding: 6px 16px;
            background: var(--accent);
            color: var(--primary);
            font-size: 11px;
            font-weight: 800;
            border-radius: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 12px rgba(255, 183, 3, 0.3);
        }

        .hero-title-area {
            display: flex;
            align-items: center;
            gap: 25px;
        }

        .hero-icon-box {
            width: 70px;
            height: 70px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            color: var(--accent);
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 30px;
            flex-shrink: 0;
        }

        .hero-title-area h1 {
            font-size: 38px;
            font-weight: 800;
            color: #ffffff;
            letter-spacing: -0.5px;
            line-height: 1.3;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }

        .detail-container {
            max-width: 1100px;
            margin: -80px auto 100px auto;
            padding: 0 24px;
            position: relative;
            z-index: 10;
        }

        .detail-wrapper {
            background: var(--bg-card);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 32px;
            padding: 50px;
            box-shadow: 0 40px 80px rgba(10, 25, 47, 0.06);
        }

        .feature-box {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: #ffffff;
            padding: 35px 40px;
            border-radius: 24px;
            border-left: 6px solid var(--accent);
            margin-bottom: 45px;
            position: relative;
            overflow: hidden;
        }

        .feature-box::after {
            content: 'GOLDEN CARGO';
            position: absolute;
            right: -20px;
            bottom: -15px;
            font-size: 45px;
            font-weight: 900;
            color: rgba(255, 255, 255, 0.03);
            letter-spacing: 2px;
            pointer-events: none;
            user-select: none;
        }

        .feature-box h4 {
            color: var(--accent);
            font-size: 16px;
            font-weight: 800;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .feature-box p {
            font-size: 17px;
            font-weight: 500;
            line-height: 1.7;
            color: rgba(255, 255, 255, 0.9);
        }

        .detail-body-content {
            color: var(--text-muted);
            font-size: 17px;
            text-align: justify;
        }

        .detail-body-content p {
            margin-bottom: 28px;
        }

        .detail-body-content strong {
            color: var(--primary);
        }

        @keyframes slowZoom {
            0% { transform: scale(1); }
            100% { transform: scale(1.1); }
        }

        @media (max-width: 768px) {
            body { padding-top: 85px; }
            .hero-banner-section { height: 360px; }
            .hero-title-area { flex-direction: column; align-items: flex-start; gap: 15px; }
            .hero-title-area h1 { font-size: 26px; }
            .hero-icon-box { width: 55px; height: 55px; font-size: 24px; border-radius: 14px; }
            .detail-container { margin-top: -50px; }
            .detail-wrapper { padding: 28px 20px; border-radius: 24px; }
            .feature-box { padding: 25px 20px; border-radius: 16px; }
            .feature-box p { font-size: 15px; }
            .detail-body-content { font-size: 15.5px; }
        }
    </style>
</head>
<body>

    <div id="header-placeholder"></div>

    <section class="hero-banner-section">
        <div class="hero-overlay"></div>
        <img id="hero-srv-bg" class="hero-bg-image" src="" alt="Golden Cargo Fleet">
        
        <div class="hero-container">
            <div class="hero-breadcrumbs">
                <a href="dichvu.html" class="btn-back-hero">
                    <i class="fa-solid fa-arrow-left"></i> Dịch vụ của chúng tôi
                </a>
            </div>
            <div class="hero-meta">
                <span class="hero-tag" id="srv-tag">Logistics</span>
            </div>
            <div class="hero-title-area">
                <div class="hero-icon-box" id="srv-icon">
                    <i class="fa-solid fa-circle-nodes"></i>
                </div>
                <h1 id="srv-title">Đang tải dữ liệu...</h1>
            </div>
        </div>

        <div class="hero-shape">
            <svg data-name="Layer 1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" preserveAspectRatio="none">
                <path d="M985.66,92.83C906.67,72,823.78,31,743.84,14.19c-82.26-17.34-168.06-16.33-250.45.39-57.84,11.73-114,31.07-172,41.86A600.21,600.21,0,0,1,0,27.35V1200H1200V195.14C1113.1,179.91,1065.25,113.73,985.66,92.83Z" class="shape-fill"></path>
            </svg>
        </div>
    </section>

    <div class="detail-container">
        <div class="detail-wrapper">
            
            <div class="feature-box">
                <h4>Thế mạnh ưu tiên từ GOLDEN CARGO</h4>
                <p id="srv-highlight">Chúng tôi cam kết bảo đảm tiến độ tối đa, tối ưu hóa toàn bộ chi phí vận hành và mang lại sự an toàn tuyệt đối cho mọi kiện hàng.</p>
            </div>

            <div class="detail-body-content" id="srv-content"></div>
            
        </div>
    </div>

    <div id="footer-placeholder"></div>

    <script>
        fetch('layout/header.html').then(r => r.text()).then(d => document.getElementById('header-placeholder').innerHTML = d);
        fetch('layout/footer.html').then(r => r.text()).then(d => document.getElementById('footer-placeholder').innerHTML = d);

        const serviceDatabase = {
            "van-chuyen-duong-bien": {
                title: "Vận Chuyển Đường Biển Quốc Tế",
                tag: "Vận tải quốc tế",
                iconClass: "fa-solid fa-ship",
                image: "images/dichvu/duongbien.png",
                highlight: "Kết nối các hải cảng trung chuyển huyết mạch lớn trên toàn thế giới với mức cước ổn định.",
                content: `<p>GOLDEN CARGO tự hào là đơn vị chuyên sâu trong lĩnh vực giao nhận và chuyển mạch hàng hóa Quốc Tế bằng đường biển. Với mạng lưới đại lý vận tải phủ rộng, các tuyến vận chuyển chính của chúng tôi kết nối chặt chẽ Việt Nam tới các khu vực trọng điểm kinh tế như <strong>Bắc Mỹ, Tây Âu, Úc, Đông Nam Á và Đông Á</strong>.</p><p>Chúng tôi cung cấp các giải pháp vận tải toàn diện từ hàng nguyên container (FCL) cho tới hàng gom lẻ (LCL). Hợp tác trực tiếp với các liên minh hãng tàu quốc tế lớn giúp GOLDEN CARGO luôn giữ vững mức giá cước ổn định, lịch trình xuất cảng linh hoạt và hạn chế tối đa các tình trạng trễ tàu tại các cảng chuyển tải phức tạp.</p>`
            },
            "van-chuyen-hang-khong": {
                title: "Vận Chuyển Hàng Không Tốc Độ",
                tag: "Vận tải quốc tế",
                iconClass: "fa-solid fa-plane",
                image: "images/dichvu/hangkhong.png",
                highlight: "Đảm bảo giữ chỗ (Space) và tải trọng ổn định ngay cả trong những mùa cao điểm khốc liệt nhất.",
                content: `<p>Đối với các mặt hàng có giá trị cao, hàng mẫu hoặc các bưu kiện có tính chất cấp bách về thời gian, dịch vụ vận tải hàng không của GOLDEN CARGO chính là sự lựa chọn tối ưu hàng đầu cho doanh nghiệp.</p><p>Nhờ vào mối quan hệ chiến lược lâu năm và uy tín cao với các hãng hàng không lớn trong nước và quốc tế, chúng tôi sở hữu ưu thế tuyệt đối trong việc giữ chỗ ổn định trong suốt các tháng cao điểm của thị trường.</p>`
            },
            "dich-vu-hai-quan": {
                title: "Dịch Vụ Đại Lý Khai Báo Hải Quan",
                tag: "Dịch vụ hỗ trợ",
                iconClass: "fa-solid fa-file-invoice-dollar",
                image: "images/dichvu/haiquan.png",
                highlight: "Là đại lý hải quan chính thức được cấp phép, thay mặt doanh nghiệp xử lý mọi quy trình pháp lý.",
                content: `<p>GOLDEN CARGO đã được Tổng cục Hải quan cấp phép chứng nhận hoạt động đại lý hải quan chính thức tại Việt Nam. Đây là một thế mạnh lớn giúp chúng tôi có thể đứng tên khai báo và thay mặt khách hàng giải quyết mọi thủ tục hành chính liên quan.</p><p>Dịch vụ bao gồm: khai báo hải quan điện tử, áp mã HS code chính xác, xin cấp giấy phép chuyên ngành, và tiến hành kiểm hóa trực tiếp tại các cảng, cửa khẩu một cách nhanh chóng.</p>`
            },
            "van-chuyen-noi-dia": {
                title: "Vận Chuyển Nội Địa Toàn Diện",
                tag: "Vận tải nội địa",
                iconClass: "fa-solid fa-truck-moving",
                image: "images/dichvu/noidia.png",
                highlight: "Sở hữu trực tiếp đội xe vận tải container chủ động, vận hành kỉ luật, trách nhiệm cao.",
                content: `<p>Để chuỗi cung ứng không bị đứt gãy, hệ thống vận tải nội địa của GOLDEN CARGO được đầu tư đồng bộ với đội ngũ xe tải nhỏ và xe đầu kéo container hiện đại. Chúng tôi hoàn toàn làm chủ dịch vụ trung chuyển mà không cần phụ thuộc vào bên thứ ba.</p><p>Làm việc với tinh thần trách nhiệm và tính kỷ luật thép, đội ngũ điều xe của chúng tôi túc trực 24/7 để giám sát hành trình trực tuyến, giúp khách hàng tránh xa được các rắc rối phát sinh như chậm chuyến, thất lạc hàng hóa.</p>`
            },
            "dich-vu-kho-bai": {
                title: "Dịch Vụ Kho Bãi Cửa Ngõ Chiến Lược",
                tag: "Dịch vụ hỗ trợ",
                iconClass: "fa-solid fa-warehouse",
                image: "images/dichvu/khobai.png",
                highlight: "Diện tích hơn 3296m² tọa lạc tại các nút giao thông cửa ngõ của TP. Hồ Chí Minh.",
                content: `<p>Hệ thống tổng kho bãi của GOLDEN CARGO hiện có 2 cụm kho lớn với tổng diện tích vận hành khai thác đạt hơn 3296m², nằm tại vị trí chiến lược cực kỳ thuận tiện cho luồng xe tải di chuyển: Trạm thu phí Xa lộ Hà Nội và khu vực Thủ Đức.</p><p>Vị trí đắc địa này giúp việc phân phối hàng hóa vào trung tâm thành phố hay trung chuyển ra các cụm cảng Cát Lái, cảng Phú Hữu vô cùng nhanh chóng.</p>`
            },
            "dich-vu-door-to-door": {
                title: "Dịch Vụ Giao Nhận Trọn Gói Door To Door",
                tag: "Vận tải quốc tế",
                iconClass: "fa-solid fa-box-open",
                image: "images/dichvu/door.png",
                highlight: "Giải pháp Logistics trọn gói 'Từ kho gửi đến kho nhận' - Khách hàng không cần lo nghĩ.",
                content: `<p>Dịch vụ trọn gói Door-to-Door của GOLDEN CARGO tích hợp đồng bộ tất cả các phương thức vận tải nội địa, hải quan và chặng quốc tế vào một quy trình duy nhất.</p><p>Chúng tôi đảm nhận từ khâu đóng gói tiêu chuẩn, bốc xếp nội địa, thông quan hai đầu xuất-nhập cho đến việc phát hàng tận tay người nhận cuối cùng tại nước bản địa. Toàn bộ tiến độ được theo dõi qua một mã vận đơn duy nhất.</p>`
            },
            "dich-vu-di-doi": {
                title: "Dịch Vụ Di Dời Quốc Tế & Nội Địa Trọn Gói",
                tag: "Vận tải nội địa",
                iconClass: "fa-solid fa-people-carry-box",
                image: "images/dichvu/didoi.png",
                highlight: "Thành viên chính thức của Tổ chức vận chuyển quốc tế IAM uy tín toàn cầu.",
                content: `<p>GOLDEN CARGO cung cấp giải pháp di dời văn phòng làm việc doanh nghiệp, căn hộ cao cấp trọn gói ở quy mô nội địa cũng như di chuyển xuyên quốc gia. Là thành viên chính thức của Tổ chức vận chuyển toàn cầu IAM (International Association of Movers), chúng tôi sở hữu mạng lưới đối tác chuyên nghiệp phủ khắp mọi quốc gia.</p><p>Quy trình thực hiện bao gồm việc khảo sát khối lượng chi tiết, lập phương án bọc lót chống trầy xước bằng vật liệu chuyên dụng và vận chuyển an toàn.</p>`
            },
            "dich-vu-luu-kho": {
                title: "Dịch Vụ Lưu Kho Quản Lý Tiêu Chuẩn Cao",
                tag: "Dịch vụ hỗ trợ",
                iconClass: "fa-solid fa-boxes-stacked",
                image: "images/dichvu/luukho.png",
                highlight: "Hệ thống kho bãi trang bị phần mềm số hóa kiểm soát hàng và PCCC chuẩn quốc gia.",
                content: `<p>Hệ thống kho bãi lưu kho của chúng tôi được thiết kế kiến trúc xây dựng tại các khu vực có địa hình khô ráo, nền móng cao, bảo đảm tuyệt đối không bị ảnh hưởng bởi triều cường hay ngập lụt.</p><p>Kho lưu kho được số hóa bằng việc áp dụng phần mềm quản lý kho thông minh giúp kiểm soát chính xác vị trí ô kệ, ngày nhập xuất và mã pallet của từng kiện hàng. Bên cạnh đó, cụm kho luôn tuân thủ nghiêm ngặt quy trình phun khử trùng định kỳ.</p>`
            }
        };

        const urlParams = new URLSearchParams(window.location.search);
        const serviceKey = urlParams.get('service');
        
        if (serviceKey && serviceDatabase[serviceKey]) {
            const currentService = serviceDatabase[serviceKey];
            document.title = currentService.title + " - GOLDEN CARGO";
            document.getElementById("srv-title").textContent = currentService.title;
            document.getElementById("srv-tag").textContent = currentService.tag;
            document.getElementById("srv-highlight").textContent = currentService.highlight;
            document.getElementById("srv-content").innerHTML = currentService.content;
            document.getElementById("srv-icon").innerHTML = `<i class="${currentService.iconClass}"></i>`;
            
            const heroBg = document.getElementById("hero-srv-bg");
            heroBg.src = currentService.image;
            heroBg.alt = currentService.title;
        } else {
            document.getElementById("srv-title").textContent = "Dịch vụ không tồn tại";
            document.getElementById("srv-content").innerHTML = "<p>Rất tiếc, thông tin dịch vụ logistics bạn đang tìm kiếm không tồn tại trên hệ thống.</p>";
            document.getElementById("hero-srv-bg").style.display = "none";
        }
    </script>
</body>
</html>
